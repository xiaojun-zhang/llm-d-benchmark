# P/D DISAGGREGATION WELL LIT PATH
# Based on https://github.com/llm-d/llm-d/tree/main/guides/pd-disaggregation
# Migrated from bash environment variables to YAML format
#
# Notes:
# - Removed pod monitoring; can be added using decode.extraContainerConfig / prefill.extraContainerConfig
# - Removed extra volumes metrics-volume and torch-compile-volume (not needed for this model/hardware)
# - Use decode.additionalVolumeMounts and decode.additionalVolumes to add them if needed
# - Use prefill.additionalVolumeMounts and prefill.additionalVolumes to add them if needed

scenario:
  # ============================================================================
  # P/D Disaggregation - Qwen3-32B with 2 prefill and 2 decode pods
  # ============================================================================
  - name: "pd-disaggregation"

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # Corresponds to: LLMDBENCH_DEPLOY_MODEL_LIST="Qwen/Qwen3-32B"
    # Alternative models (commented out in original):
    #   - Qwen/Qwen3-0.6B
    #   - facebook/opt-125m
    #   - meta-llama/Llama-3.1-8B-Instruct
    #   - meta-llama/Llama-3.1-70B-Instruct
    #   - deepseek-ai/DeepSeek-R1-0528
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
      # Corresponds to: LLMDBENCH_VLLM_COMMON_PVC_MODEL_CACHE_SIZE=1Ti
      size: 1Ti
      # Corresponds to: LLMDBENCH_VLLM_COMMON_MAX_MODEL_LEN=32000
      maxModelLen: 32000
      # Corresponds to: LLMDBENCH_VLLM_COMMON_BLOCK_SIZE=128
      blockSize: 128
      gpuMemoryUtilization: 0.95
      cacheBase: /model-cache

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multinode Configuration (LeaderWorkerSet)
    # -------------------------------------------------------------------------
    #multinode:
    #  enabled: true

    # -------------------------------------------------------------------------
    # Routing Configuration
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_INFERENCE_MODEL=true
    # Corresponds to: LLMDBENCH_LLMD_ROUTINGSIDECAR_CONNECTOR=nixlv2 (default)
    # -------------------------------------------------------------------------
    routing:
      connector: nixlv2

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # Corresponds to: LLMDBENCH_VLLM_COMMON_AFFINITY (left uncommented for auto-detect)
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_GAIE_PLUGINS_CONFIGFILE="pd-config.yaml"
    # Reference: https://github.com/llm-d/llm-d/blob/main/guides/pd-disaggregation/gaie-pd/values.yaml
    # -------------------------------------------------------------------------
    inferenceExtension:
      pluginsConfigFile: "pd-config.yaml"
      pluginsCustomConfig:
        pd-config.yaml: |
          # ALWAYS DO PD IN THIS EXAMPLE (THRESHOLD 0)
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          kind: EndpointPickerConfig
          featureGates:
            - prepareDataPlugins
          plugins:
            - type: prefill-header-handler
            - type: prefix-cache-scorer
              parameters:
                maxPrefixBlocksToMatch: 256
                lruCapacityPerServer: 31250
            - type: queue-scorer
            - type: prefill-filter
            - type: decode-filter
            - type: max-score-picker
            - type: prefix-based-pd-decider
              parameters:
                nonCachedTokens: 16
            - type: pd-profile-handler
              parameters:
                primaryPort: 0
                deciderPluginName: prefix-based-pd-decider
          schedulingProfiles:
            - name: prefill
              plugins:
                - pluginRef: prefill-filter
                - pluginRef: max-score-picker
                - pluginRef: prefix-cache-scorer
                  weight: 2
                - pluginRef: queue-scorer
                  weight: 1
            - name: decode
              plugins:
                - pluginRef: decode-filter
                - pluginRef: max-score-picker
                - pluginRef: prefix-cache-scorer
                  weight: 2
                - pluginRef: queue-scorer
                  weight: 1

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Storage Configuration
    # Corresponds to: LLMDBENCH_VLLM_COMMON_PVC_MODEL_CACHE_SIZE=1Ti
    #                 LLMDBENCH_VLLM_COMMON_PVC_STORAGE_CLASS (auto-detect if not set)
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true (continued)
    # The following sections configure prefill and decode pods.
    # =========================================================================

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multi-NIC Pod Annotations (uncomment to enable)
    # To enable multi-nic, add annotations.prefill.pod / annotations.decode.pod below.
    # -------------------------------------------------------------------------
    #annotations:
    #  prefill:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-inference
    #  decode:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-inference

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_*
    # -------------------------------------------------------------------------
    prefill:
      enabled: true
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_REPLICAS=1
      replicas: 1

      initContainers:
        - name: preprocess
          image: ghcr.io/llm-d/llm-d-benchmark:auto
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_TENSOR_PARALLELISM=$LLMDBENCH_VLLM_COMMON_TENSOR_PARALLELISM (=2)
      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_CPU_NR=$LLMDBENCH_VLLM_COMMON_CPU_NR (=32)
      #                 LLMDBENCH_VLLM_MODELSERVICE_PREFILL_CPU_MEM=$LLMDBENCH_VLLM_COMMON_CPU_MEM (=128Gi)
      resources:
        limits:
          memory: 128Gi
          cpu: "32"
        requests:
          memory: 128Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # To enable roce/gdr for prefill pods, add networkResource and networkNr below.
      # -----------------------------------------------------------------------
      #networkResource: "rdma/roce_gdr"
      #networkNr: 1

      # Custom vLLM command -- replaces the auto-generated command.
      # Both decode.vllm.customCommand and prefill.vllm.customCommand are supported.
      # vllmCommon.flags.* are NOT applied when customCommand is set.
      # Only --kv-transfer-config and --kv-events-config from vllmCommon
      # are appended if enabled.

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # Corresponds to: LLMDBENCH_VLLM_COMMON_ENVVARS_TO_YAML
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # Corresponds to: LLMDBENCH_VLLM_COMMON_EXTRA_CONTAINER_CONFIG
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_EXTRA_VOLUME_MOUNTS
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_PREFILL_EXTRA_VOLUMES
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # Decode Configuration
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_*
    # -------------------------------------------------------------------------
    decode:
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_REPLICAS=2
      replicas: 2

      initContainers:
        - name: preprocess
          image: ghcr.io/llm-d/llm-d-benchmark:auto
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_TENSOR_PARALLELISM=$LLMDBENCH_VLLM_COMMON_TENSOR_PARALLELISM (=2)
      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_CPU_NR=$LLMDBENCH_VLLM_COMMON_CPU_NR (=32)
      #                 LLMDBENCH_VLLM_MODELSERVICE_DECODE_CPU_MEM=$LLMDBENCH_VLLM_COMMON_CPU_MEM (=128Gi)
      resources:
        limits:
          memory: 128Gi
          cpu: "32"
        requests:
          memory: 128Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_NETWORK_RESOURCE
      #                 LLMDBENCH_VLLM_MODELSERVICE_DECODE_NETWORK_NR
      # To enable roce/gdr for decode pods, add networkResource and networkNr below.
      # -----------------------------------------------------------------------
      #networkResource: "rdma/roce_gdr"
      #networkNr: 1

      # Custom vLLM command -- replaces the auto-generated command.
      # Both decode.vllm.customCommand and prefill.vllm.customCommand are supported.
      # vllmCommon.flags.* are NOT applied when customCommand is set.
      # Only --kv-transfer-config and --kv-events-config from vllmCommon
      # are appended if enabled.

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # Corresponds to: LLMDBENCH_VLLM_COMMON_ENVVARS_TO_YAML
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # Corresponds to: LLMDBENCH_VLLM_COMMON_EXTRA_CONTAINER_CONFIG
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # vLLM Common Configuration
    # Shared settings for both decode and prefill pods.
    # When no customCommand is set on decode/prefill, the vLLM serve command
    # is auto-generated from these fields:
    #   - model.maxModelLen, model.blockSize maps to --max-model-len, --block-size
    #   - model.gpuMemoryUtilization maps to --gpu-memory-utilization
    #   - decode/prefill.parallelism.tensor maps to --tensor-parallel-size
    #   - vllmCommon.flags.* maps to --enforce-eager, --no-enable-log-requests, etc.
    #   - vllmCommon.kvTransfer.* maps to --kv-transfer-config (if enabled)
    #   - vllmCommon.kvEvents.* maps to --kv-events-config (if enabled)
    #   - decode/prefill.vllm.additionalFlags maps to appended as extra CLI args
    # When decode.vllm.customCommand or prefill.vllm.customCommand IS set, it replaces the auto-generated
    # command entirely. Only --kv-transfer-config and --kv-events-config are
    # still appended from vllmCommon if enabled. All other vllmCommon.flags
    # are ignored -- the custom command must include its own flags.
    # -------------------------------------------------------------------------
    vllmCommon:
      host: "0.0.0.0"
      # KV Transfer Configuration
      # Corresponds to: --kv-transfer-config in LLMDBENCH_VLLM_MODELSERVICE_*_EXTRA_ARGS
      kvTransfer:
        enabled: true
        connector: NixlConnector
        role: kv_both

      # KV Events not enabled in this scenario (used in precise-prefix-cache-aware)
      kvEvents:
        enabled: false

      flags:
        enforceEager: false  # Not in original bash script
        disableLogRequests: true     # modelservice only -- upstream vllm-openai (v0.9+) dropped --no-enable-log-requests
        disableUvicornAccessLog: true
        enablePrefixCaching: true   # PR 868: P/D enables prefix caching
        allowLongMaxModelLen: "1"
        serverDevMode: "1"

      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_*_EXTRA_VOLUMES
      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            # Corresponds to: LLMDBENCH_VLLM_COMMON_SHM_MEM (using default 16Gi)
            sizeLimit: 16Gi

      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_*_EXTRA_VOLUME_MOUNTS
      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Timeout Configuration
    # Corresponds to: LLMDBENCH_CONTROL_WAIT_TIMEOUT=900000
    #                 LLMDBENCH_HARNESS_WAIT_TIMEOUT=900000
    # -------------------------------------------------------------------------
    timeouts:
      controlWait: 900000
      harnessWait: 900000

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    # -------------------------------------------------------------------------
    # Workload/Harness Configuration
    # Corresponds to: LLMDBENCH_HARNESS_NAME=vllm-benchmark
    #                 LLMDBENCH_HARNESS_EXPERIMENT_PROFILE=random_concurrent.yaml
    #                 LLMDBENCH_CONTROL_WORK_DIR=~/data/pd-disaggregation
    # -------------------------------------------------------------------------
    workDir: "~/data/pd-disaggregation"

    harness:
      name: vllm-benchmark
      experimentProfile: random_concurrent.yaml